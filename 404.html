<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found | QuickScale Media</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800;900&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* Self-contained so the 404 renders no matter what path triggered it. */
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Hanken Grotesk',system-ui,sans-serif;background:#faf8f3;color:#1b1813;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:40px 24px;min-height:100vh;
  }
  .mark{width:46px;height:46px;border-radius:12px;background:#FFC400;display:flex;align-items:center;justify-content:center;font-family:'Archivo',sans-serif;font-weight:900;font-size:26px;color:#1b1813;margin-bottom:24px;}
  .code{font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(56px,16vw,120px);line-height:1;letter-spacing:-.03em;margin:0;}
  .code span{color:#FFC400;}
  h1{font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(20px,4vw,28px);letter-spacing:-.01em;margin:14px 0 10px;}
  p{font-size:16px;line-height:1.6;color:#6f6757;max-width:46ch;margin:0 0 28px;}
  .actions{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;}
  .btn{font-family:'Archivo',sans-serif;font-weight:800;font-size:15px;text-decoration:none;border-radius:12px;padding:14px 22px;cursor:pointer;display:inline-flex;align-items:center;min-height:44px;}
  .btn--primary{background:#FFC400;color:#1b1813;box-shadow:0 6px 18px rgba(255,196,0,.34);}
  .btn--outline{background:none;color:#1b1813;border:2px solid #1b1813;}
  .tag{margin-top:34px;font-family:'Archivo',sans-serif;font-weight:700;color:#8a8068;font-size:14px;}
</style>
</head>
<body>
  <div class="mark" aria-hidden="true">Q</div>
  <p class="code">4<span>0</span>4</p>
  <h1>That page took a wrong turn.</h1>
  <p>The page you're looking for doesn't exist or has moved. Let's get you back to booking more jobs.</p>
  <div class="actions">
    <a class="btn btn--primary" href="/">Back to home</a>
    <a class="btn btn--outline" href="/contact/">Book a call</a>
  </div>
  <div class="tag">Scale Quick! ⚡</div>
</body>
